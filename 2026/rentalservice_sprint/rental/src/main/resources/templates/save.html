<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
<!-- action 속성: form에 작성한 데이터를 어디로 보낼지 지정 -->
<form action="/rental/save" method="post">
  <!-- name 속성: 서버로 전송할 때 변수 이름의 역할 -->
  이메일: <input type="text" name="rentalEmail"> <br>
  비밀번호: <input type="password" name="rentalPassword"> <br>
  이름: <input type="text" name="rentalName"> <br>
  <input type="submit" value="회원가입">
</form>
</body>
</html>
